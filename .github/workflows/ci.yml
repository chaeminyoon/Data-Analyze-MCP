name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        # pandas 2 and 3 differ in string dtypes ('object' vs 'str') —
        # both must stay green.
        pandas: ["pandas>=2.2,<3", "pandas>=3.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          pip install -e ".[dev]"
          pip install "${{ matrix.pandas }}"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
        env:
          MPLBACKEND: Agg
